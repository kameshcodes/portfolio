<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Resume of Kamesh Dubey — Quantitative Analyst" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="./css/index.css" />
  <link rel="stylesheet" href="./css/resume.css" />
  <link rel="icon" href="./public/D.avif" type="image/x-icon" />
  <title>Resume — Kamesh Dubey</title>
</head>

<body class="body-light">
  <header id="top">
    <a class="icon-border header-title" href="https://kameshcodes.github.io/portfolio/">kameshcodes</a>
    <nav>
      <ul id="nav">
        <li>
          <a href="https://kameshcodes.github.io/portfolio/" class="link">Home</a>
        </li>
        <li>
          <a href="https://kameshcodes.github.io/portfolio/#project" class="link">Projects</a>
        </li>
        <li>
          <a href="https://kameshcodes.github.io/portfolio/#stack" class="link">Tech Skills</a>
        </li>
        <li>
          <a href="https://kameshcodes.github.io/portfolio/#contact" class="link">Contact</a>
        </li>
        <li>
          <a href="https://kameshcodes.github.io/portfolio/blogs" class="link">Blogs</a>
        </li>
      </ul>
      <button aria-label="Toggle theme" id="toggleTheme">
        <i aria-hidden="true" class="icon-normal fas fa-moon"></i>
      </button>
      <button aria-label="Toggle navbar">
        <i aria-hidden="true" class="icon-normal fas fa-bars"></i>
      </button>
    </nav>
  </header>

  <main>

    <!-- Download button -->
    <div class="resume-actions">
      <button class="btn" id="downloadResume">
        <i class="fas fa-download"></i> Resume
      </button>
    </div>

    <!-- Resume as image -->
    <div class="resume-embed">
      <img src="./public/resume/resume.png" alt="Resume — Kamesh Dubey" />
    </div>

  </main>

  <footer>
    <small>&copy; 2026-27 <a href="https://www.linkedin.com/in/kameshcodes" target="_blank" style="color:inherit;text-decoration:none;">Kamesh Dubey</a></small>
    <h6>All rights Reserved</h6>
  </footer>

  <div class="scroll-container">
    <div aria-label="Scroll up" class="scroll-up">
      <a href="#top">
        <i aria-hidden="true" class="fas fa-arrow-up"></i>
      </a>
    </div>
  </div>

  <script>
    // Theme toggle
    const body = document.body;
    const themeBtn = document.querySelector('#toggleTheme');
    const navBtn = document.querySelector('.fa-bars');
    const nav = document.querySelector('#nav');

    themeBtn.addEventListener('click', () => {
      body.classList.toggle('body-light');
      body.classList.toggle('body-dark');
      const icon = themeBtn.querySelector('i');
      icon.classList.toggle('fa-moon');
      icon.classList.toggle('fa-sun');
    });

    // Mobile nav toggle
    if (navBtn) {
      navBtn.addEventListener('click', () => {
        nav.classList.toggle('navOpen');
      });
    }

    // Scroll-to-top visibility
    const scrollUp = document.querySelector('.scroll-up');
    if (scrollUp) {
      window.addEventListener('scroll', () => {
        scrollUp.style.display = window.scrollY > 300 ? 'block' : 'none';
      });
    }

    // Force download resume PDF
    document.getElementById('downloadResume').addEventListener('click', function() {
      const link = document.createElement('a');
      link.href = './public/resume/Resume_Kamesh_Dubey.pdf';
      link.download = 'Resume_Kamesh_Dubey.pdf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  </script>
</body>

</html>
